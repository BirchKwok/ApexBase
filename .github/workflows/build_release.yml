name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Rust tests (core lib without PyO3, plus server/flight features) ──
  rust-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        features:
          - ""                  # core only (--no-default-features)
          - "server"            # PG wire protocol
          - "flight"            # Arrow Flight gRPC
        rust: [stable]
      fail-fast: false

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Rust ${{ matrix.rust }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.os }}-${{ matrix.features }}

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install protobuf

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        choco install protoc -y

    - name: cargo test (no-default-features ${{ matrix.features && format('+ {0}', matrix.features) || '— core only' }})
      run: |
        cargo test --no-default-features ${{ matrix.features && format('--features {0}', matrix.features) || '' }} --release
      env:
        RUST_BACKTRACE: 1

  # ── Python tests (existing) ──
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install -e .
    - name: Run tests
      run: |
        pytest --ignore=test/test_memory_vs_duckdb.py

  # ── Build Linux wheels (manylinux) ──
  build-wheels-linux:
    needs: [test, rust-test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Build wheels (manylinux)
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: --release --out dist --interpreter /opt/python/cp39-cp39/bin/python /opt/python/cp310-cp310/bin/python /opt/python/cp311-cp311/bin/python /opt/python/cp312-cp312/bin/python /opt/python/cp313-cp313/bin/python
        manylinux: 2014

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-manylinux
        path: dist/*.whl

  # ── Build macOS / Windows wheels ──
  build-wheels:
    needs: [test, rust-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      id: py
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Show Python
      run: |
        python -c "import sys; print(sys.executable); print(sys.version)"

    - name: Build wheels
      uses: PyO3/maturin-action@v1
      env:
        PYO3_PYTHON: ${{ steps.py.outputs.python-path }}
        PYTHON_SYS_EXECUTABLE: ${{ steps.py.outputs.python-path }}
      with:
        command: build
        args: --release --out dist --interpreter ${{ steps.py.outputs.python-path }}

    - name: Upload wheel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
        path: dist/*.whl

  # ── Build source distribution ──
  build-sdist:
    needs: [test, rust-test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
    - name: Upload sdist artifact
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  # ── Publish to PyPI ──
  publish:
    needs: [build-wheels-linux, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install twine
      run: |
        python -m pip install --upgrade pip
        pip install twine
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        python -m twine upload --verbose --skip-existing dist/**/*.whl dist/**/*.tar.gz

  # ── Publish to crates.io ──
  publish-crate:
    needs: [rust-test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler

    - name: Verify crate packaging
      run: |
        cargo package --no-default-features --allow-dirty --list

    - name: Publish to crates.io (if version not exists)
      run: |
        VERSION=$(grep "^version" Cargo.toml | head -1 | cut -d'"' -f2)
        echo "Checking if apexbase v${VERSION} exists on crates.io..."
        if cargo search apexbase --limit 1 2>/dev/null | grep -q "apexbase = \"${VERSION}\""; then
          echo "Version ${VERSION} already exists on crates.io, skipping publish."
          exit 0
        fi
        echo "Publishing apexbase v${VERSION}..."
        cargo publish --no-default-features --allow-dirty
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
