name: Performance regression

on:
  pull_request:
    paths:
      - "apexbase/**"
      - "benchmarks/**"
      - "test/**"
      - "Cargo.toml"
      - "build.rs"
      - "pyproject.toml"
      - ".cargo/**"
      - ".github/workflows/performance.yml"
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: performance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUSTFLAGS: "-C target-cpu=native"
  PERF_BASE_TARGET_DIR: ${{ github.workspace }}/target/performance/base
  PERF_CURRENT_TARGET_DIR: ${{ github.workspace }}/target/performance/current

jobs:
  canary:
    if: github.event_name != 'schedule'
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create benchmark virtual environment
        run: |
          python -m venv "${RUNNER_TEMP}/apexbase-venv"
          echo "VIRTUAL_ENV=${RUNNER_TEMP}/apexbase-venv" >> "${GITHUB_ENV}"
          echo "${RUNNER_TEMP}/apexbase-venv/bin" >> "${GITHUB_PATH}"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: performance-macos-arm64

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            maturin==1.9.1 \
            numpy==2.1.3 \
            pyarrow==23.0.1 \
            pandas==3.0.1 \
            polars==1.39.3 \
            duckdb==1.1.3

      - name: Resolve comparison commit
        id: base
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          else
            base_sha="$(git rev-parse HEAD^)"
          fi
          echo "sha=${base_sha}" >> "${GITHUB_OUTPUT}"

      - name: Build base commit
        shell: bash
        run: |
          base_dir="${RUNNER_TEMP}/apexbase-base"
          git worktree add --detach "${base_dir}" "${{ steps.base.outputs.sha }}"
          cd "${base_dir}"
          CARGO_TARGET_DIR="${PERF_BASE_TARGET_DIR}" \
            maturin build --release --out "${RUNNER_TEMP}/wheels/base"

      - name: Build current commit
        shell: bash
        run: |
          CARGO_TARGET_DIR="${PERF_CURRENT_TARGET_DIR}" \
            maturin build --release --out "${RUNNER_TEMP}/wheels/current"
          sleep 30

      - name: Benchmark base commit
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps \
            "${RUNNER_TEMP}/wheels/base/"*.whl
          APEXBASE_BENCHMARK_COMMIT="${{ steps.base.outputs.sha }}" \
          APEXBASE_BENCHMARK_BRANCH="pull-request-base" \
            python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-base-1.json"

      - name: Benchmark current commit
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps \
            "${RUNNER_TEMP}/wheels/current/"*.whl
          python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-current-1.json"
          python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-current-2.json"

      - name: Benchmark base commit again
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps \
            "${RUNNER_TEMP}/wheels/base/"*.whl
          APEXBASE_BENCHMARK_COMMIT="${{ steps.base.outputs.sha }}" \
          APEXBASE_BENCHMARK_BRANCH="pull-request-base" \
            python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-base-2.json"
          APEXBASE_BENCHMARK_COMMIT="${{ steps.base.outputs.sha }}" \
          APEXBASE_BENCHMARK_BRANCH="pull-request-base" \
            python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-base-3.json"

      - name: Benchmark current commit again
        shell: bash
        run: |
          python -m pip install --force-reinstall --no-deps \
            "${RUNNER_TEMP}/wheels/current/"*.whl
          python benchmarks/bench_perf_canary.py \
            --rows 200000 \
            --warmup 2 \
            --iterations 7 \
            --output "${RUNNER_TEMP}/perf-current-3.json"

      - name: Compare ApexBase performance
        run: |
          python benchmarks/compare_perf_baseline.py \
            "${RUNNER_TEMP}/perf-base-1.json" \
            "${RUNNER_TEMP}/perf-current-1.json" \
            --baseline-sample "${RUNNER_TEMP}/perf-base-2.json" \
            --baseline-sample "${RUNNER_TEMP}/perf-base-3.json" \
            --current-sample "${RUNNER_TEMP}/perf-current-2.json" \
            --current-sample "${RUNNER_TEMP}/perf-current-3.json" \
            --relative-threshold 0.15 \
            --absolute-threshold-ms 0.005 \
            --require-system-match

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-canary
          path: ${{ runner.temp }}/perf-*.json

  nightly-full:
    if: github.event_name == 'schedule'
    runs-on: [self-hosted, macOS, ARM64, apexbase-performance]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create benchmark virtual environment
        run: |
          python -m venv "${RUNNER_TEMP}/apexbase-venv"
          echo "VIRTUAL_ENV=${RUNNER_TEMP}/apexbase-venv" >> "${GITHUB_ENV}"
          echo "${RUNNER_TEMP}/apexbase-venv/bin" >> "${GITHUB_PATH}"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: performance-macos-arm64

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            maturin==1.9.1 \
            pytest==8.4.1 \
            pytest-timeout==2.4.0 \
            numpy==2.1.3 \
            pyarrow==23.0.1 \
            pandas==3.0.1 \
            polars==1.39.3 \
            duckdb==1.1.3

      - name: Benchmark previous commit
        shell: bash
        run: |
          base_sha="$(git rev-parse HEAD^)"
          base_dir="${RUNNER_TEMP}/apexbase-base"
          git worktree add --detach "${base_dir}" "${base_sha}"
          cd "${base_dir}"
          CARGO_TARGET_DIR="${PERF_BASE_TARGET_DIR}" maturin develop --release
          cd "${GITHUB_WORKSPACE}"
          APEXBASE_BENCHMARK_COMMIT="${base_sha}" \
          APEXBASE_BENCHMARK_BRANCH="nightly-base" \
            python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-base-full-1.json"

      - name: Benchmark current commit
        shell: bash
        run: |
          CARGO_TARGET_DIR="${PERF_CURRENT_TARGET_DIR}" maturin develop --release
          python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-current-full-1.json"
          python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-current-full-2.json"

      - name: Benchmark previous commit again
        shell: bash
        run: |
          base_sha="$(git rev-parse HEAD^)"
          base_dir="${RUNNER_TEMP}/apexbase-base"
          cd "${base_dir}"
          CARGO_TARGET_DIR="${PERF_BASE_TARGET_DIR}" maturin develop --release
          cd "${GITHUB_WORKSPACE}"
          APEXBASE_BENCHMARK_COMMIT="${base_sha}" \
          APEXBASE_BENCHMARK_BRANCH="nightly-base" \
            python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-base-full-2.json"
          APEXBASE_BENCHMARK_COMMIT="${base_sha}" \
          APEXBASE_BENCHMARK_BRANCH="nightly-base" \
            python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-base-full-3.json"

      - name: Benchmark current commit again
        shell: bash
        run: |
          CARGO_TARGET_DIR="${PERF_CURRENT_TARGET_DIR}" maturin develop --release
          python benchmarks/bench_vs_sqlite_duckdb.py \
            --output "${RUNNER_TEMP}/perf-current-full-3.json"

      - name: Verify repeatable pytest runtime
        run: |
          python benchmarks/check_pytest_runtime.py \
            --runs 5 \
            --limit-seconds 9.0 \
            --allowed-over-limit 1 \
            --max-spread-seconds 1.0 \
            --output "${RUNNER_TEMP}/pytest-runtime.json"

      - name: Compare full ApexBase performance
        run: |
          python benchmarks/compare_perf_baseline.py \
            "${RUNNER_TEMP}/perf-base-full-1.json" \
            "${RUNNER_TEMP}/perf-current-full-1.json" \
            --baseline-sample "${RUNNER_TEMP}/perf-base-full-2.json" \
            --baseline-sample "${RUNNER_TEMP}/perf-base-full-3.json" \
            --current-sample "${RUNNER_TEMP}/perf-current-full-2.json" \
            --current-sample "${RUNNER_TEMP}/perf-current-full-3.json" \
            --relative-threshold 0.15 \
            --absolute-threshold-ms 0.005 \
            --require-system-match

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-full
          path: |
            ${{ runner.temp }}/perf-*-full-*.json
            ${{ runner.temp }}/pytest-runtime.json
